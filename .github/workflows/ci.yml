name: CI-Pipeline
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      # 1. Checkout
      - name: Checkout código
        uses: actions/checkout@v4
 
      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      # 3. Instalar dependencias
      - name: Install deps
        run: pip install pylint pytest && pip install -r requirements.txt
 
      # 4. Pruebas unitarias (con stub / sin API real)
      - name: Run unit tests (stub)
        run: pytest test_unit_with_stub.py -v
 
      # 5. Pruebas de integración (con fake)
      - name: Run integration tests (fake)
        run: pytest test_integration_with_fake.py -v
 